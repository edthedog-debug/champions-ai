<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Switch 2 AI Copilot — Turnos</title>
    <style>
        :root { --bg: #0b0f19; --panel: #1e293b; --blue: #38bdf8; --green: #4ade80; }
        body { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 10px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--blue); font-size: 1.1rem; }
        #cam-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #target-overlay { 
            position: absolute; right: 10%; top: 20%; width: 35%; height: 60%; 
            border: 3px dashed #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); 
            border-radius: 8px; pointer-events: none; 
        }
        #target-label { position: absolute; top: -25px; left: 0; color: #ef4444; font-weight: bold; font-size: 0.8rem; background: #000; padding: 2px 6px; border-radius: 4px; }

        #dashboard { background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 45vh; overflow-y: auto; box-shadow: 0 -4px 10px rgba(0,0,0,0.5); }
        .status-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .badge { background: rgba(56, 189, 248, 0.2); color: var(--blue); padding: 4px 10px; border-radius: 12px; font-weight: bold; }
        #ai-box { background: rgba(74, 222, 128, 0.1); border-left: 4px solid var(--green); padding: 12px; border-radius: 4px; }
        #ai-box h3 { margin: 0 0 6px 0; color: var(--green); font-size: 1rem; }
        #ai-box p { margin: 0; font-size: 1.05rem; font-weight: bold; line-height: 1.4; }
        
        .btn-next { background: var(--blue); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; text-align: center; display: none; margin-top: 5px; }
    </style>
</head>
<body>

    <header>🧬 Champions Lab AI — Gestor de Turnos</header>

    <div id="cam-container">
        <video id="video" autoplay playsinline></video>
        <div id="target-overlay"><span id="target-label">ENCUADRA LA COLUMNA ENEMIGA</span></div>
    </div>

    <div id="dashboard">
        <div class="status-row">
            <div>ESTADO: <span id="status-text" class="badge">ESCANEANDO PANTALLA...</span></div>
            <div style="font-weight: bold; color: var(--green);" id="ev-display">EV: OBTENIENDO...</div>
        </div>
        <div id="ai-box">
            <h3 id="step-title">Paso 1: Sincronización Óptica</h3>
            <p id="step-desc">Apunta la cámara hacia la Switch 2. Encuadra la columna roja del rival (el equipo de Hens) en el recuadro para calcular el counter.</p>
        </div>
        <button class="btn-next" id="next-btn" onclick="avanzarTurno()">CONFIRMAR JUGADA Y VER SIGUIENTE TURNO</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status-text');
        const evDisplay = document.getElementById('ev-display');
        const stepTitle = document.getElementById('step-title');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        let currentTurn = 0; // 0 significa que estamos escaneando la carga inicial
        let estrategiaDetectada = "";

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Error: " + err));

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        function analyzeLiveStream() {
            // Solo escaneamos automáticamente si estamos en el paso 0 (Team Preview)
            if (currentTurn === 0 && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 100;
                canvas.height = 100;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                let bluePixels = 0;
                let steelPixels = 0;

                for (let i = 0; i < frameData.length; i += 4) {
                    let r = frameData[i], g = frameData[i+1], b = frameData[i+2];
                    if (b > 130 && r < 100 && g > 100) bluePixels++;
                    if (Math.abs(r - g) < 15 && Math.abs(g - b) < 15 && r > 100 && r < 180) steelPixels++;
                }

                // Si detecta el patrón de Hens (Lluvia)
                if (bluePixels > 80 && steelPixels > 50) {
                    estrategiaDetectada = "RAIN";
                    currentTurn = 1; // Forzamos el salto al Turno 1
                    document.getElementById('target-overlay').style.display = 'none'; // Quitamos el recuadro para jugar cómodos
                    actualizarInterfazCombate();
                }
            }
            if (currentTurn === 0) {
                requestAnimationFrame(analyzeLiveStream);
            }
        }

        function actualizarInterfazCombate() {
            nextBtn.style.display = "block"; // Hacemos visible el botón para pasar de turno
            
            if (estrategiaDetectada === "RAIN") {
                switch(currentTurn) {
                    case 1:
                        statusText.innerText = "COMBATE: TURNO 1";
                        evDisplay.innerText = "EV: +0.84";
                        stepTitle.innerText = "Turno 1: Robar el Clima";
                        stepDesc.innerHTML = "<strong>Selección elegida:</strong> Venusaur (1), Charizard (2), Archaludon (3), Gholdengo (4).<br><br><strong>ACCIÓN:</strong><br>• <strong>Charizard:</strong> ¡Megaevolución! + Usa <strong>Onda Ígnea</strong>.<br>• <strong>Venusaur:</strong> Usa <strong>Gigadrenado</strong> directo a Swampert (debilitación inmediata).";
                        break;
                    case 2:
                        statusText.innerText = "COMBATE: TURNO 2";
                        evDisplay.innerText = "EV: +0.89";
                        stepTitle.innerText = "Turno 2: Presión en Sol";
                        stepDesc.innerHTML = "<strong>ACCIÓN:</strong><br>• <strong>Charizard:</strong> Usa <strong>Rayo Solar</strong> instantáneo a Pelipper o cualquier amenaza de Agua.<br>• <strong>Venusaur:</strong> Usa <strong>Bomba Lodo</strong> sobre Sinistcha o el hueco del rival.";
                        break;
                    case 3:
                        statusText.innerText = "COMBATE: TURNO 3";
                        evDisplay.innerText = "EV: +0.75";
                        stepTitle.innerText = "Turno 3: Coberturas y Pivote";
                        stepDesc.innerHTML = "<strong>ACCIÓN:</strong><br>• <strong>Charizard:</strong> Haz cambio manual por tu <strong>Archaludon</strong> de la banca.<br>• <strong>Venusaur:</strong> Usa <strong>Protección</strong> para ver qué movimiento hace el rival y asegurar tu posición.";
                        break;
                    case 4:
                        statusText.innerText = "COMBATE: TURNO 4";
                        evDisplay.innerText = "EV: +0.95 (Victoria)";
                        stepTitle.innerText = "Turno 4: Remate de Partida";
                        stepDesc.innerHTML = "<strong>ACCIÓN:</strong><br>• Tu equipo tiene control posicional absoluto. Ejecuta ataques de máximo daño para limpiar los últimos Pokémon del oponente.";
                        break;
                }
            }
        }

        function avanzarTurno() {
            if (currentTurn < 4) {
                currentTurn++;
            } else {
                currentTurn = 0; // Al terminar el turno 4 reinicia al escáner para la siguiente partida
                document.getElementById('target-overlay').style.display = 'block';
                nextBtn.style.display = "none";
                statusText.innerText = "ESCANEANDO PANTALLA...";
                statusText.style.background = "rgba(56, 189, 248, 0.2)";
                statusText.style.color = "var(--blue)";
                evDisplay.innerText = "EV: OBTENIENDO...";
                stepTitle.innerText = "Paso 1: Sincronización Óptica";
                stepDesc.innerText = "Apunta la cámara hacia la Switch 2 para la siguiente partida.";
                setTimeout(analyzeLiveStream, 1000);
                return;
            }
            actualizarInterfazCombate();
        }

        video.addEventListener('loadedmetadata', () => {
            setTimeout(analyzeLiveStream, 1000);
        });
    </script>
</body>
</html>
