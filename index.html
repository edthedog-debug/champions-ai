<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Champions Lab AI</title>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-height: 50vh; background: #000; object-fit: cover; border-radius: 12px; }
        .btn { background: #38bdf8; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
        .box { background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; border-left: 4px solid #38bdf8; }
    </style>
</head>
<body>
    <h2>🧬 Champions Lab AI - Copilot</h2>
    <video id="v" autoplay playsinline></video>
    <div class="box">
        <h3 id="t">TURNO 1: Apertura de Control</h3>
        <p id="d">Charizard Y: MEGAEVOLUCIÓN + ONDA ÍGNEA.<br>Milotic: VIENTO HIELO (Baja velocidad rival).</p>
    </div>
    <button class="btn" onclick="n()">SIGUIENTE TURNO</button>
    <script>
        let t=1;
        const s={
            1:{t:"TURNO 1: Apertura de Control",d:"Charizard Y: MEGA + ONDA ÍGNEA.<br>Milotic: VIENTO HIELO."},
            2:{t:"TURNO 2: Castigo Focalizado",d:"Charizard Y: RAYO SOLAR al rival peligroso.<br>Milotic: ESCALDAR al atacante físico."},
            3:{t:"TURNO 3: Transición Segura",d:"Charizard Y: CAMBIO MANUAL por GARCHOMP.<br>Milotic: PROTECCIÓN."},
            4:{t:"TURNO 4: Pinza Final",d:"Garchomp: TERREMOTO.<br>Milotic: VIENTO HIELO o RECUPERACIÓN."}
        };
        function n(){t=t<4?t+1:1;document.getElementById('t').innerText=s[t].t;document.getElementById('d').innerHTML=s[t].d;}
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{document.getElementById('v').srcObject=stream;}).catch(e=>alert("Error cámara: "+e));
    </script>
</body>
</html>
